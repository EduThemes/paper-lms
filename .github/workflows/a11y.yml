name: Accessibility

# 13.12 — promoted from workflow_dispatch to pull_request so every PR is
# gated by the axe audit. The Puppeteer/Chromium download flow now uses
# the system chromium that ubuntu-latest ships with (PUPPETEER_SKIP_DOWNLOAD=1
# + PUPPETEER_EXECUTABLE_PATH). Keep workflow_dispatch for ad-hoc reruns.
on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/a11y.yml'

jobs:
  axe:
    name: axe-core audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund
        env:
          PUPPETEER_SKIP_DOWNLOAD: '1'

      - name: Build frontend
        run: npm run build

      - name: Start static server
        run: npx serve dist -l 5174 &

      - name: Wait for server
        run: npx --yes wait-on http://localhost:5174 -t 30000

      - name: Run axe-core
        run: npm run axe

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: axe-screenshots
          path: web/axe-screenshots
          if-no-files-found: ignore
