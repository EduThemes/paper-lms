name: Reset Owner Password

# Manual fallback for resetting the owner-admin password on the demo box when
# SMTP is not configured (so the in-app forgot-password flow can't email a
# link). Bcrypts the target password on the runner, SSHes to the demo box,
# and runs the UPDATE via the existing `backup` container (which already has
# DATABASE_URL set + psql installed).
#
# Inputs are intentionally minimal — login_id defaults to the owner account,
# new_password defaults to the seed password so the value isn't echoed in the
# workflow-run history. Override either when needed for ad-hoc resets.

on:
  workflow_dispatch:
    inputs:
      login_id:
        description: "User login_id to reset"
        required: true
        default: "michael@aprendio.ai"

jobs:
  reset:
    name: Reset password
    runs-on: ubuntu-latest
    steps:
      - name: Bcrypt the new password
        id: bcrypt
        env:
          NEW_PASSWORD: paperpaper
        run: |
          pip install --quiet bcrypt
          HASH=$(python3 - <<'PY'
          import bcrypt, os
          pw = os.environ["NEW_PASSWORD"].encode()
          print(bcrypt.hashpw(pw, bcrypt.gensalt(rounds=10)).decode(), end="")
          PY
          )
          echo "::add-mask::$HASH"
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: SSH and run UPDATE via backup container
        uses: appleboy/ssh-action@v1
        env:
          BCRYPT_HASH: ${{ steps.bcrypt.outputs.hash }}
          LOGIN_ID: ${{ inputs.login_id }}
        with:
          host: ${{ secrets.DEMO_SSH_HOST }}
          username: ${{ secrets.DEMO_SSH_USER }}
          key: ${{ secrets.DEMO_SSH_KEY }}
          port: ${{ secrets.DEMO_SSH_PORT || 22 }}
          envs: BCRYPT_HASH,LOGIN_ID
          command_timeout: 5m
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEMO_REPO_PATH }}"

            COMPOSE_FILE=deployments/docker/docker-compose.prod.yml
            OVERRIDE_FILE=deployments/docker/docker-compose.override.yml
            ENV_FILE=.env

            DC=(docker compose -f "$COMPOSE_FILE")
            [ -f "$OVERRIDE_FILE" ] && DC+=(-f "$OVERRIDE_FILE")
            [ -f "$ENV_FILE" ] && DC+=(--env-file "$ENV_FILE")

            # psql via the `backup` service (postgres:16-alpine image with
            # DATABASE_URL preset). Override entrypoint to sh so we get one
            # shell that can expand $DATABASE_URL inside the container.
            # SQL goes in via stdin to keep the bcrypt hash out of argv.
            printf "UPDATE users SET password_hash='%s' WHERE login_id='%s' RETURNING id, login_id, name;\n" \
              "$BCRYPT_HASH" "$LOGIN_ID" \
              | "${DC[@]}" run --rm -T --entrypoint sh backup \
                  -c 'psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f -'
