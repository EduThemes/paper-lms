server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 500M;

    # Global security headers — applied to all responses (including errors) via `always`.
    # Note: nginx's add_header is NOT inherited into a `location` block if that block
    # declares its own add_header. Per-location blocks below repeat critical headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    # HSTS: only meaningful over HTTPS; kept inside the 443 server block.
    # 2 years, includeSubDomains, preload — only enable preload after confirming
    # all subdomains are HTTPS-only and you intend to submit to hstspreload.org.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Content Security Policy is now owned by the Go backend
    # (internal/api/v1/middleware/csp.go), which emits a per-request nonce in
    # `Content-Security-Policy` (enforce mode) plus an `X-CSP-Nonce` response
    # header. We rewrite `__CSP_NONCE__` placeholders in the served HTML to
    # that upstream nonce so any inline <script>/<style> can opt in without
    # weakening CSP with 'unsafe-inline'.
    #
    # Requires the ngx_http_sub_module (compiled into the stock nginx and
    # nginx:alpine images). `sub_filter_once off` rewrites every occurrence
    # per response; `sub_filter_types text/html` scopes substitution to HTML.
    sub_filter_once off;
    sub_filter_types text/html;
    sub_filter __CSP_NONCE__ $upstream_http_x_csp_nonce;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Service worker and index.html must never be cached — browsers must
    # always check for updates so new deploys take effect immediately
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Vite hashed assets are immutable (filename changes per build)
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # TODO: Uploaded files are currently served by the Go backend through /api/
    # (see internal/storage/ + file_service.go), so SVG hardening must be done
    # in the backend response layer (set Content-Disposition: attachment for
    # *.svg, or rewrite to a sanitized SVG / rasterize). If user-uploaded files
    # are ever moved to be served directly by nginx (e.g. /uploads/), add:
    #
    #   location ~* ^/uploads/.+\.svg$ {
    #       add_header Content-Disposition "attachment" always;
    #       add_header X-Content-Type-Options "nosniff" always;
    #       # Re-declare other security headers here, since add_header in a
    #       # location block masks server-level add_header directives.
    #   }
}
