services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: paper_lms
      POSTGRES_USER: paper
      POSTGRES_PASSWORD: paper
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paper -d paper_lms"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://paper:paper@postgres:5432/paper_lms?sslmode=disable
      JWT_SECRET: change-this-to-a-secure-secret-in-production
      PORT: "3000"
      FRONTEND_URL: http://localhost
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
