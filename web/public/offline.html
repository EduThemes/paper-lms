<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline - Paper LMS</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
        'Helvetica Neue', Arial, sans-serif;
      background-color: #f8fafc;
      color: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .container {
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      background-color: #2563eb;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg {
      width: 48px;
      height: 48px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 0.5rem;
    }

    .brand {
      color: #2563eb;
    }

    .offline-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      background-color: #fef3c7;
      color: #92400e;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.375rem 0.75rem;
      border-radius: 9999px;
      margin-bottom: 1.5rem;
    }

    .offline-badge svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
      color: #475569;
      margin-bottom: 1.5rem;
    }

    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background-color: #2563eb;
      color: #ffffff;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background-color 0.15s ease;
    }

    .retry-btn:hover {
      background-color: #1d4ed8;
    }

    .retry-btn:focus-visible {
      outline: 2px solid #2563eb;
      outline-offset: 2px;
    }

    .retry-btn:active {
      background-color: #1e40af;
    }

    .retry-btn svg {
      width: 18px;
      height: 18px;
    }

    .hint {
      margin-top: 2rem;
      font-size: 0.8125rem;
      color: #94a3b8;
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.25rem; }
      p { font-size: 0.9375rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <text x="50%" y="52%" dominant-baseline="central" text-anchor="middle"
              font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
              font-size="32" font-weight="700" fill="#ffffff">P</text>
      </svg>
    </div>

    <div class="offline-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23" />
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <line x1="12" y1="20" x2="12.01" y2="20" />
      </svg>
      Offline
    </div>

    <h1>You're offline</h1>
    <p>
      <span class="brand">Paper LMS</span> requires an internet connection.
      Your work will sync when you reconnect.
    </p>

    <button class="retry-btn" onclick="window.location.reload()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10" />
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
      </svg>
      Try again
    </button>

    <p class="hint">Check your Wi-Fi or mobile data connection and try again.</p>
  </div>
</body>
</html>
